spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:mem:healthclaimx_auth
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        show_sql: true
        format_sql: true

server:
  port: 8081
  servlet:
    context-path: /

jwt:
  secret: your-super-secret-jwt-key-change-this-in-production-environment
  expiration: 86400000

logging:
  level:
    root: INFO
    com.healthclaimx: DEBUG
